version: 2
updates:
  - package-ecosystem: npm
    directory: /collector
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
    labels:
      - dependencies

  - package-ecosystem: npm
    directory: /viewer
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    commit-message:
      prefix: chore(ci)
    labels:
      - dependencies
      - ci
